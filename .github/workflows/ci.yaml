name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        run: make test

  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      operator-image: ${{ steps.tags.outputs.operator_image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Set image tags
        id: tags
        run: |
          REPO=quay.io/mathianasj/mirror-operator
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tags=${REPO}:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "operator_image=${REPO}:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${REPO}:latest" >> "$GITHUB_OUTPUT"
            echo "operator_image=${REPO}:latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  bundle-and-catalog:
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install operator-sdk
        run: |
          OS=$(go env GOOS)
          ARCH=$(go env GOARCH)
          curl -sSLo operator-sdk https://github.com/operator-framework/operator-sdk/releases/download/v1.39.2/operator-sdk_${OS}_${ARCH}
          chmod +x operator-sdk
          sudo mv operator-sdk /usr/local/bin/

      - uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Set image variables
        id: vars
        run: |
          REPO=quay.io/mathianasj/mirror-operator
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.1"
          fi
          echo "img=${{ needs.build-and-push.outputs.operator-image }}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "bundle_img=${REPO}-bundle:v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "catalog_img=${REPO}-catalog:v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate bundle
        run: make bundle IMG=${{ steps.vars.outputs.img }} VERSION=${{ steps.vars.outputs.version }}

      - name: Build and push bundle image
        run: |
          make bundle-build BUNDLE_IMG=${{ steps.vars.outputs.bundle_img }}
          make bundle-push BUNDLE_IMG=${{ steps.vars.outputs.bundle_img }}

      - name: Build and push catalog image (FBC)
        run: |
          make catalog-build CATALOG_IMG=${{ steps.vars.outputs.catalog_img }} BUNDLE_IMGS=${{ steps.vars.outputs.bundle_img }} VERSION=${{ steps.vars.outputs.version }}
          make catalog-push CATALOG_IMG=${{ steps.vars.outputs.catalog_img }}
          make catalog-clean
