apiVersion: mirror.mirror.mathianasj.github.com/v1
kind: DisconnectedPlatform
metadata:
  labels:
    app.kubernetes.io/name: mirror-operator
    app.kubernetes.io/managed-by: kustomize
  name: disconnected-platform-clusterissuer
spec:
  mode: connected
  connected:
    collectionSchedule: "0 2 * * 0"
    mirrorRegistry: "quay.example.com/mirror"
    # cert-manager issuer for TLS certificates (used by managed Keycloak, Quay, etc.)
    certIssuer:
      name: letsencrypt-prod
      kind: ClusterIssuer
    artifactStorage:
      size: 200Gi
    triggerTypes:
      - scheduled
      - manual
    operators:
      openshiftPipelines: {}
      keycloak: {}
      rhtas: {}
      rhtpa: {}
    rhtas:
      oidc:
        managed:
          enabled: true
          realm: "trusted-artifact-signer"
        type: "email"
      database:
        host: "postgres.example.com"
        name: "rhtas"
        port: 5432
    rhtpa:
      storage:
        type: local
        size: 200Gi
      database:
        host: postgres.example.com
        name: rhtpa
        username: rhtpa
        password: change-me
  architect:
    enabled: true
