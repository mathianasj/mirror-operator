apiVersion: mirror.mirror.mathianasj.github.com/v1
kind: DisconnectedPlatform
metadata:
  labels:
    app.kubernetes.io/name: mirror-operator
    app.kubernetes.io/managed-by: kustomize
  name: disconnected-platform-rhtas
spec:
  mode: connected
  connected:
    collectionSchedule: "0 2 * * 0"
    mirrorRegistry: "quay.example.com/mirror"
    artifactStorage:
      size: 200Gi
    triggerTypes:
      - scheduled
      - manual
    operators:
      openshiftPipelines: {}
      rhtas: {}
      rhtpa: {}
    rhtas:
      oidc:
        # External OIDC provider (existing Keycloak, GitHub, Google, etc.)
        issuer: "https://keycloak.example.com/realms/trusted-artifact-signer"
        clientId: "trusted-artifact-signer"
        type: "email"  # or "github-workflow", "spiffe", "kubernetes", "uri"
      database:
        host: "postgres.example.com"
        name: "rhtas"
        port: 5432
        username: "rhtas"
        password: "change-me"
    rhtpa:
      storage:
        type: local
        size: 200Gi
      database:
        host: postgres.example.com
        name: rhtpa
        username: rhtpa
        password: change-me
  architect:
    enabled: true
    frontendImage: quay.io/mathianasj/openshift-airgap-architect-frontend:9fa8f29be04be2c87b35abbba921def9021c3b80
    backendImage: quay.io/mathianasj/openshift-airgap-architect-backend:9fa8f29be04be2c87b35abbba921def9021c3b80
