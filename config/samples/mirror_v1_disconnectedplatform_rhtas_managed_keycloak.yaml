apiVersion: mirror.mirror.mathianasj.github.com/v1
kind: DisconnectedPlatform
metadata:
  labels:
    app.kubernetes.io/name: mirror-operator
    app.kubernetes.io/managed-by: kustomize
  name: disconnected-platform-managed-keycloak
spec:
  mode: connected
  connected:
    collectionSchedule: "0 2 * * 0"
    mirrorRegistry: "quay.example.com/mirror"
    artifactStorage:
      size: 2Ti
    triggerTypes:
      - scheduled
      - manual
    operators:
      openshiftPipelines: {}
      keycloak: {}          # Enable Red Hat build of Keycloak operator
      rhtas: {}
      rhtpa: {}
    rhtas:
      oidc:
        # Managed Keycloak - operator will create Keycloak instance and realm
        managed:
          enabled: true
          realm: "trusted-artifact-signer"  # Optional, defaults to "trusted-artifact-signer"
          # REQUIRED (unless using tlsSecret): Specify cert-manager issuer for TLS certificates
          certIssuer:
            name: letsencrypt-production-ec2     # Name of your ClusterIssuer or Issuer
            kind: ClusterIssuer                  # or "Issuer" for namespace-scoped
          # tlsSecret:  # Alternative - use custom TLS secret instead of cert-manager
          #   name: my-keycloak-tls
        type: "email"       # Optional, defaults to "email" for managed
      database:
        host: "postgres.example.com"
        name: "rhtas"
        port: 5432
        username: "rhtas"
        password: "change-me"
    rhtpa:
      storage:
        type: local
        size: 20Gi
      database:
        host: postgres.example.com
        name: rhtpa
        username: rhtpa
        password: change-me
  architect:
    enabled: true
