<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d5e"/>
      <stop offset="100%" stop-color="#1a1a3a"/>
    </linearGradient>
    <linearGradient id="upper" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#ee4444"/>
      <stop offset="100%" stop-color="#bb2233"/>
    </linearGradient>
    <linearGradient id="flame1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff4400"/>
      <stop offset="40%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
    <linearGradient id="flame2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ee3300"/>
      <stop offset="50%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>

  <!-- === LEFT: Connected cloud with globe/internet === -->
  <g transform="translate(6, 8)">
    <!-- Cloud shape -->
    <path d="M12,24 Q4,24 4,18 Q4,13 9,12 Q9,6 16,5 Q22,4 26,8 Q28,4 34,4 Q42,4 42,12 Q47,13 47,18 Q47,24 40,24 Z" fill="#4488ee" opacity="0.85"/>
    <!-- Globe circle inside cloud -->
    <circle cx="26" cy="15" r="7" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.9"/>
    <!-- Globe meridian lines -->
    <ellipse cx="26" cy="15" rx="3" ry="7" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.7"/>
    <line x1="19" y1="15" x2="33" y2="15" stroke="#ffffff" stroke-width="0.8" opacity="0.7"/>
    <line x1="20" y1="11" x2="32" y2="11" stroke="#ffffff" stroke-width="0.6" opacity="0.5"/>
    <line x1="20" y1="19" x2="32" y2="19" stroke="#ffffff" stroke-width="0.6" opacity="0.5"/>
    <!-- WiFi waves coming off cloud -->
    <path d="M44,10 Q48,7 52,10" fill="none" stroke="#44aaff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    <path d="M45,6 Q50,2 55,6" fill="none" stroke="#44aaff" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Arrow from cloud down to shoe -->
  <path d="M30,34 Q28,40 32,46" fill="none" stroke="#4488ee" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <polygon points="29,45 32,50 35,45" fill="#4488ee" opacity="0.7"/>

  <!-- === RIGHT: Airgapped server rack with shield/lock === -->
  <g transform="translate(78, 6)">
    <!-- Server rack outline -->
    <rect x="4" y="4" width="36" height="28" rx="3" fill="#16213e" stroke="#228855" stroke-width="1.5"/>
    <!-- Server unit 1 -->
    <rect x="8" y="7" width="28" height="6" rx="1" fill="#0f3460"/>
    <rect x="10" y="9" width="10" height="2" rx="0.5" fill="#1a4a7a" opacity="0.6"/>
    <circle cx="32" cy="10" r="1.8" fill="#44ee88"/>
    <!-- Server unit 2 -->
    <rect x="8" y="16" width="28" height="6" rx="1" fill="#0f3460"/>
    <rect x="10" y="18" width="10" height="2" rx="0.5" fill="#1a4a7a" opacity="0.6"/>
    <circle cx="32" cy="19" r="1.8" fill="#44ee88"/>
    <!-- Server unit 3 -->
    <rect x="8" y="25" width="28" height="5" rx="1" fill="#0f3460"/>
    <rect x="10" y="27" width="10" height="1.5" rx="0.5" fill="#1a4a7a" opacity="0.6"/>
    <circle cx="32" cy="27.5" r="1.8" fill="#44ee88"/>

    <!-- Shield overlay -->
    <path d="M22,0 L32,-2 L32,6 Q32,12 22,14 Q12,12 12,6 L12,-2 Z" fill="#228855" opacity="0.85"/>
    <path d="M22,2 L29,0 L29,5 Q29,10 22,12 Q15,10 15,5 L15,0 Z" fill="#1a1a3a" opacity="0.6"/>
    <!-- Lock icon inside shield -->
    <rect x="19" y="5" width="6" height="5" rx="1" fill="#44ee88" opacity="0.9"/>
    <path d="M20,5 L20,3.5 Q20,1 22,1 Q24,1 24,3.5 L24,5" fill="none" stroke="#44ee88" stroke-width="1.2"/>
    <circle cx="22" cy="7.5" r="0.8" fill="#1a1a3a"/>

    <!-- No-wifi / disconnected X over waves -->
    <g transform="translate(-10, 10)" opacity="0.5">
      <path d="M2,6 Q5,3 8,6" fill="none" stroke="#e94560" stroke-width="1" stroke-linecap="round"/>
      <path d="M1,3 Q5,0 9,3" fill="none" stroke="#e94560" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="1" y1="0" x2="9" y2="8" stroke="#e94560" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Arrow from shoe up to server -->
  <path d="M96,52 Q100,44 102,38" fill="none" stroke="#44ee88" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <polygon points="99,36 102,32 105,37" fill="#44ee88" opacity="0.7"/>

  <!-- === HOT ROD FLAMES shooting behind/below the sole === -->
  <g transform="translate(10, 44)">
    <!-- Large outer flames (behind the shoe, from heel trailing back) -->
    <path d="M4,58 Q-4,52 -8,56 Q-4,48 -12,50 Q-6,42 -14,44 Q-6,36 -2,42 Q2,36 6,42 Q8,48 4,54 Z" fill="url(#flame1)" opacity="0.9"/>
    <!-- Medium flame tongues -->
    <path d="M8,56 Q2,50 -2,54 Q2,46 -4,48 Q0,40 6,44 Q10,48 8,54 Z" fill="url(#flame2)" opacity="0.85"/>
    <!-- Small inner hot flames (white/yellow core) -->
    <path d="M6,56 Q2,52 0,54 Q2,48 -2,50 Q2,44 6,48 Q8,52 6,54 Z" fill="#ffee66" opacity="0.7"/>

    <!-- Flames licking along bottom of sole toward toe -->
    <path d="M14,62 Q10,56 6,60 Q10,54 4,56 Q8,50 14,54 Q18,58 14,62 Z" fill="url(#flame1)" opacity="0.75"/>
    <path d="M28,62 Q24,58 22,60 Q24,54 20,56 Q22,52 28,56 Q30,58 28,62 Z" fill="url(#flame2)" opacity="0.6"/>
    <path d="M42,62 Q40,58 38,60 Q40,56 36,58 Q38,54 42,56 Q44,58 42,62 Z" fill="url(#flame1)" opacity="0.45"/>

    <!-- Sole bottom - thick rubber -->
    <path d="M12,62 L4,62 Q0,62 0,58 L0,56 Q0,54 4,54 L100,54 Q108,54 108,56 L108,58 Q108,62 104,62 Z" fill="#f0f0f0"/>
    <!-- Sole tread -->
    <line x1="10" y1="60" x2="16" y2="60" stroke="#cccccc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="60" x2="26" y2="60" stroke="#cccccc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="30" y1="60" x2="36" y2="60" stroke="#cccccc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="40" y1="60" x2="46" y2="60" stroke="#cccccc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="50" y1="60" x2="56" y2="60" stroke="#cccccc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="60" y1="60" x2="66" y2="60" stroke="#cccccc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="70" y1="60" x2="76" y2="60" stroke="#cccccc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="80" y1="60" x2="86" y2="60" stroke="#cccccc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="90" y1="60" x2="96" y2="60" stroke="#cccccc" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Midsole -->
    <path d="M12,54 L4,54 Q0,54 0,50 L2,48 Q4,46 8,46 L96,44 Q104,44 106,46 L108,50 Q108,54 104,54 Z" fill="#dddddd"/>

    <!-- Hot rod flame stripe on midsole -->
    <path d="M4,52 Q12,48 20,52 Q28,48 36,52 Q44,48 52,52 Q60,48 68,52 Q76,48 84,52 Q92,48 100,52 Q104,50 106,52" fill="none" stroke="#ff6600" stroke-width="1.5" opacity="0.5"/>

    <!-- Shoe upper - main body -->
    <path d="M8,46 L6,30 Q4,10 14,4 L20,2 Q24,0 30,0 L42,2 Q48,4 50,8 L54,16 Q56,20 60,22 L80,30 Q96,36 102,40 Q106,42 106,44 L96,44 Q90,44 8,46 Z" fill="url(#upper)"/>

    <!-- Toe box -->
    <path d="M80,30 Q96,36 102,40 Q106,42 106,44 L96,44 Q92,44 82,44 L76,44 Q72,40 74,36 Z" fill="#cc2233"/>

    <!-- Tongue -->
    <path d="M24,2 Q28,-2 34,-4 L40,-2 Q44,0 44,4 L42,2 Q38,2 30,0 Q26,0 24,2 Z" fill="#ff6666"/>

    <!-- Heel counter -->
    <path d="M6,30 Q4,10 14,4 L18,6 Q10,12 8,30 Z" fill="#aa1122"/>

    <!-- Swoosh -->
    <path d="M16,40 Q40,22 80,30" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>

    <!-- Eyelets -->
    <circle cx="28" cy="8" r="2" fill="#aa1122" stroke="#ffffff" stroke-width="1"/>
    <circle cx="34" cy="6" r="2" fill="#aa1122" stroke="#ffffff" stroke-width="1"/>
    <circle cx="40" cy="6" r="2" fill="#aa1122" stroke="#ffffff" stroke-width="1"/>
    <circle cx="46" cy="8" r="2" fill="#aa1122" stroke="#ffffff" stroke-width="1"/>

    <!-- Laces -->
    <line x1="28" y1="8" x2="34" y2="6" stroke="#ffffff" stroke-width="1.2" opacity="0.8"/>
    <line x1="34" y1="6" x2="40" y2="6" stroke="#ffffff" stroke-width="1.2" opacity="0.8"/>
    <line x1="40" y1="6" x2="46" y2="8" stroke="#ffffff" stroke-width="1.2" opacity="0.8"/>
    <line x1="28" y1="8" x2="40" y2="6" stroke="#ffffff" stroke-width="0.8" opacity="0.5"/>
    <line x1="34" y1="6" x2="46" y2="8" stroke="#ffffff" stroke-width="0.8" opacity="0.5"/>

    <!-- Collar padding -->
    <path d="M6,30 Q8,26 14,24 Q18,28 14,32" fill="#ff6666" opacity="0.6"/>
  </g>

  <!-- USB drive tucked in shoe top -->
  <g transform="translate(52, 34)">
    <rect x="0" y="0" width="16" height="12" rx="2.5" fill="#333366" stroke="#555588" stroke-width="0.8"/>
    <rect x="4" y="-4" width="8" height="5" rx="1" fill="#555588"/>
    <rect x="6" y="-3" width="1.8" height="2.5" rx="0.5" fill="#aaaacc"/>
    <rect x="8.5" y="-3" width="1.8" height="2.5" rx="0.5" fill="#aaaacc"/>
    <circle cx="8" cy="6" r="1.5" fill="#44ee88"/>
  </g>

  <!-- Heat shimmer / smoke wisps above flames -->
  <path d="M4,80 Q2,76 4,72" fill="none" stroke="#ff8800" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
  <path d="M8,82 Q6,78 8,74" fill="none" stroke="#ff6600" stroke-width="0.6" stroke-linecap="round" opacity="0.2"/>
</svg>
