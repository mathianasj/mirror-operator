# permissions for end users to view mirror-operator CRDs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mirror-operator
    app.kubernetes.io/managed-by: kustomize
  name: mirror-viewer-role
rules:
- apiGroups:
  - mirror.mirror.mathianasj.github.com
  resources:
  - disconnectedplatforms
  - collectionpipelines
  - mirrorimports
  - mirrorreleases
  - clusterbootstraps
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - mirror.mirror.mathianasj.github.com
  resources:
  - disconnectedplatforms/status
  - collectionpipelines/status
  - mirrorimports/status
  - mirrorreleases/status
  - clusterbootstraps/status
  verbs:
  - get
